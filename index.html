<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Graduation Invite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Laurea di Shreshtha</h1>
    <p class="subtitle">Gradu(ate)?</p>
    <p class="details">March 04 2026</p>
    <p class="details">Politecnico di Milano, Building 9, Leonardo Campus</p>
    <p class="details">Proclaimation Time: to be updated by 03/03 Evening</p>
    <a href="#rsvp" class="btn">RSVP Here</a>
  </div>
</section>

<!-- RSVP -->
<section id="rsvp" class="section reveal">
  <h2>RSVP</h2>

  <form action="https://formspree.io/f/mgoljvbj" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>

    <select name="attendance">
      <option value="yes">Attending in person</option>
      <option value="online">Joining online</option>
      <option value="no">Not attending</option>
    </select>

    <input type="text" name="Comments" placeholder="comments">

    <button type="submit">Submit</button>
  </form>
</section>

<!-- ONLINE -->
<section class="section reveal">
  <h2>To Join Online</h2>
  <a href="https://meet.google.com/osf-dceb-gyd">
    Join via Google Meet
  </a>
</section>

<script src="script.js"></script>

</body>
</html>
